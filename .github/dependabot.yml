version: 2
updates:
  # npm 依赖自动更新
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      typeorm:
        patterns:
          - "typeorm"
          - "@nestjs/typeorm"
      testing:
        patterns:
          - "jest*"
          - "@types/jest"
          - "ts-jest"
          - "supertest"
    ignore:
      # 主版本升级需要人工评估
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions 自动更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
