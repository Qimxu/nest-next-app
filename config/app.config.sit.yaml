# Application Configuration
app:
  port: 3000
  nodeEnv: sit
  apiBaseUrl: https://sit-api.yourdomain.com

# Database Configuration
db:
  type: mysql
  host: your-sit-db-host
  port: 3306
  username: your-username
  password: your-password
  database: nest_next_app
  synchronize: false

# Redis Configuration
redis:
  host: your-sit-redis-host
  port: 6379
  password: your-redis-password
  db: 0

# JWT Configuration
jwt:
  secret: your-sit-jwt-secret-key
  refreshSecret: your-sit-jwt-refresh-secret-key
  expiresIn: 15m
  refreshExpiresIn: 7d

# Throttle Configuration
throttle:
  ttl: 60000
  limit: 100
