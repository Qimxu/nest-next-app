# Application Configuration
app:
  port: 3000
  nodeEnv: development
  apiBaseUrl: http://localhost:3000

# Database Configuration
db:
  type: mysql
  host: localhost
  port: 3306
  username: root
  password:
  database: nest_next_app
  synchronize: true

# Redis Configuration
redis:
  host: localhost
  port: 6379
  password:
  db: 0

# JWT Configuration
jwt:
  secret: your-jwt-secret-key-change-in-production
  refreshSecret: your-jwt-refresh-secret-key-change-in-production
  expiresIn: 30m
  refreshExpiresIn: 7d

# Throttle Configuration
throttle:
  ttl: 60000
  limit: 100
